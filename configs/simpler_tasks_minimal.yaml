mechanism:
  name: simpler_tasks
  config:
    tasks:
      - copy
      - reverse
      - set
      - deduplicate
      - length
      - search
      - union
      - intersect
    min_symbols: 4
    max_symbols: 16
    min_query_symbols: 1
    max_query_symbols: 3
    sequence_count: 256
    eval_sequence_count: 64
    max_length: 96

model:
  model_name_or_path: sshleifer/tiny-gpt2
  config_overrides:
    n_positions: 96

run:
  output_dir: runs/simpler-tasks-minimal
  max_steps: 20
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  logging_steps: 5
  save_steps: 20
  eval_steps: 20
