task:
  name: dyck
  config:
    preset: smoke
    num_bracket_types: 4
    min_pairs: 8
    max_pairs: 32
    max_depth: 8
    max_length: 96

model:
  model_name_or_path: sshleifer/tiny-gpt2
  config_overrides:
    n_positions: 96

run:
  output_dir: runs/dyck-minimal
  max_steps: 20
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  logging_steps: 5
  save_steps: 20
  eval_steps: 20
