mechanism:
  name: nca
  config:
    preset: smoke
    init_rollout_steps: 4
    complexity_min: 0.35

model:
  model_name_or_path: sshleifer/tiny-gpt2
  config_overrides:
    n_positions: 256

run:
  output_dir: runs/nca-minimal
  max_steps: 20
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  logging_steps: 5
  save_steps: 20
  eval_steps: 20
