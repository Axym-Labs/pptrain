mechanism:
  name: nca
  config:
    grid_size: 8
    rollout_steps: 12
    sequence_count: 64
    eval_sequence_count: 16
    hidden_dim: 16
    complexity_min: 0.35
    complexity_max: 1.0

model:
  model_name_or_path: sshleifer/tiny-gpt2
  config_overrides:
    n_positions: 256

run:
  output_dir: runs/nca-minimal
  max_steps: 20
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  logging_steps: 5
  save_steps: 20
  eval_steps: 20
